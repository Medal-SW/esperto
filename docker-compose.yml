services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-esperto}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-esperto123}
      POSTGRES_DB: ${POSTGRES_DB:-esperto}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-esperto} -d ${POSTGRES_DB:-esperto}"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      target: dev
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-esperto}:${POSTGRES_PASSWORD:-esperto123}@db:5432/${POSTGRES_DB:-esperto}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      target: dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  pgdata:
  uploads:
